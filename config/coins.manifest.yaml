# ═══════════════════════════════════════════════════════════════════════════════
# SPIRAL POOL v2.1.0 - SINGLE COIN MANIFEST
# ═══════════════════════════════════════════════════════════════════════════════
#
# This file is the CANONICAL source for coin definitions.
# All subsystems derive their coin data from this manifest.
#
# ARCHITECTURE:
#   - Metadata (names, ports, display) → From this manifest
#   - Consensus logic (hashing, serialization) → From Go code (immutable)
#   - Validation → Manifest values cross-checked against Go at startup
#
# TO ADD A NEW COIN:
#   1. Add entry to this file
#   2. Add Go implementation in src/stratum/internal/coin/<symbol>.go
#   3. Run validation: spiralctl config validate
#   4. Commit both files together
#
# WARNING: Consensus-critical values (chain_id, version_bit, genesis_hash)
#          are validated against Go constants at startup. Mismatches
#          will cause the pool to REFUSE TO START (fail-fast).
#
# MINING SECTION SCHEMA:
#   mining:
#     stratum_port: <port>           # Stratum V1 port (miners connect here)
#     stratum_v2_port: <port>        # Stratum V2 binary protocol (V1 + 1)
#     stratum_tls_port: <port>       # Stratum TLS encrypted (V1 + 2)
#     firewall_profiles:             # Windows Firewall network profiles
#       - private                    # Home/work networks (recommended)
#       - domain                     # Corporate domain networks
#       - public                     # Public WiFi (NOT recommended for security)
#
# ═══════════════════════════════════════════════════════════════════════════════

schema_version: "1.0"

# Global configuration
global:
  supported_algorithms:
    - sha256d
    - scrypt

  # Default firewall profiles for Windows (can be overridden per-coin)
  default_firewall_profiles:
    - private
    - domain

# ═══════════════════════════════════════════════════════════════════════════════
