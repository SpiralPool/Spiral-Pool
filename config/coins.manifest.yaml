      stratum_tls_port: 4335
      # firewall_profiles: uses global default (private, domain)

    address:
      p2pkh_version: 0x00  # '1' addresses
      p2sh_version: 0x05   # '3' addresses
      bech32_hrp: "bc"     # 'bc1' addresses

    chain:
      genesis_hash: "000000000019d6689c085ae165831e934ff763ae46a2a6c172b3f1b60a8ce26f"
      block_time: 600
      coinbase_maturity: 100
      supports_segwit: true
      min_coinbase_script_len: 2

    merge_mining:
      can_be_parent: true
      supported_aux_algorithms:
