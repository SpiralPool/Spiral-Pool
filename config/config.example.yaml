# Spiral Pool v2.2.1 Configuration
# Multi-coin support with node failover
# Supports SHA256d coins: BTC, BCH, DGB, BC2, NMC, SYS, XMY, FBTC, QBX
# Supports Scrypt coins: LTC, DOGE, DGB-SCRYPT, PEP, CAT
#
# NOTE: This is a TEMPLATE. All "CHANGE_ME" passwords are replaced automatically
# by install.sh with randomly generated values during installation.
# If editing manually, replace ALL "CHANGE_ME" values with strong passwords.
#
# AUTOMATIC MINER ROUTING (Spiral Router):
# All miners connect to the SAME port. The pool automatically detects miner type
# from the user-agent string during mining.subscribe and sets appropriate difficulty:
#
#   Lottery (ESP32 Miner):            0.001   (target: 60s shares)
#   Low (BitAxe Ultra, NMAxe):        580     (target: 5s shares)
#   Mid (NerdQAxe, BitAxe Hex):       1165    (target: 1s shares)
#   High (Antminer S9, older gen):    3260    (target: 1s shares)
#   Pro (Antminer S19+, S21):         25600   (target: 1s shares)
#
# Difficulty auto-adjusts based on actual hashrate to maintain target share times.
# No need for separate low-diff ports - one port handles everything!
#
version: 1

# Global settings (apply to all coins)
global:
  log_level: info        # debug, info, warn, error
  log_format: json       # json, text
  metrics_port: 9100     # Prometheus metrics
  api_port: 4000         # REST API
  api_enabled: true

  # Spiral Sentinel — internal pool health monitoring
  # Monitors WAL stuck entries, node health, hashrate/connection drops, disk space.
  # Complementary to the external Python Spiral Sentinel (miner hardware monitoring).
  sentinel:
    enabled: true
    check_interval: 60s          # How often to run checks
    wal_stuck_threshold: 10m     # Alert if WAL entry pending longer than this
    block_drought_hours: 0       # Alert after N hours with no blocks (0 = disabled)
    disconnect_drop_percent: 30  # Alert if connections drop by this % in one interval
    hashrate_drop_percent: 30    # Alert if hashrate drops by this % in one interval
    wal_disk_space_warning_mb: 500  # Early warning (100MB is fail-fast)
    wal_max_files: 60            # Alert if WAL file count exceeds this
    false_rejection_threshold: 0.10  # Alert if false rejection rate exceeds 10%
    retry_rate_threshold: 5      # Alert if block retries exceed 5/hour
    alert_cooldown: 15m          # Same alert type+coin won't fire within this period
    payment_stall_checks: 5      # Checks without progress before payment stall alert
    goroutine_limit: 10000       # Absolute goroutine count warning threshold
    node_health_threshold: 0.5   # Per-node health score warning level (0.0-1.0)
    ha_flap_window: 10m          # Window for HA role flap detection
    ha_flap_threshold: 3         # Max role changes in window before CRITICAL alert
    orphan_rate_threshold: 0.20  # Orphan rate warning (0.20 = 20%, needs 10+ blocks)
    chain_tip_stall_minutes: 30  # Alert if daemon block height unchanged for N minutes
    min_peer_count: 3            # Alert if daemon peer count drops below this
    maturity_stall_hours: 6      # Alert if a found block stays pending for N hours
    # webhooks:                  # Uncomment and configure to enable push alerts
    #   - url: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_TOKEN"
    #   - url: "https://api.telegram.org/botYOUR_BOT_TOKEN/sendMessage"
    #     chat_id: "YOUR_CHAT_ID"

# Shared database (tables isolated by pool_id)
database:
  host: localhost
  port: 5432
  user: spiralstratum
  password: "CHANGE_ME"
  database: spiralstratum
  maxConnections: 1000  # High limit to handle burst share submissions
  batching:
    size: 1000
    interval: 5s

# Coin pool configurations
coins:
  # DigiByte Pool (SHA256d)
  - symbol: DGB
    pool_id: dgb_mainnet
    enabled: false  # User must explicitly enable their chosen coin(s)
    address: "DYourDigiByteAddressHere"
    coinbase_text: "Spiral Pool"

    stratum:
      port: 3333              # Single port - miner type auto-detected from user-agent
      difficulty:
        initial: 5000         # Fallback for unknown miners (overridden by auto-routing)
        varDiff:
          enabled: true
          minDiff: 0.0001     # Very low for ESP32 miners (~50 KH/s)
          maxDiff: 1000000000000  # 1 trillion - supports S21 (200 TH/s) on BTC
          # targetTime: auto-derived from blockTime (BlockTime/4, capped 2-30s)
          # For DGB (15s blocks): ~3.75s target -> multiple shares per block
          # Override if needed, otherwise leave commented for auto-detection
          # targetTime: 4     # Seconds between shares (auto-derived if omitted)
          retargetTime: 60    # Adjust every 60 seconds
          variancePercent: 30
          # blockTime: 15     # Optional: Override block time (auto-detected from coin)
      banning:
        enabled: true
        banDuration: 600s
        invalidSharesThreshold: 10  # More forgiving for lottery miners
      connection:
        timeout: 600s
        maxConnections: 10000
        keepaliveInterval: 60s
      version_rolling:
        enabled: true
        mask: 536862720  # 0x1FFFE000
      job_rebroadcast: 30s

    # Multiple nodes for failover
    nodes:
      - id: primary
        host: 127.0.0.1
        port: 14022
        user: rpcuser
        password: "CHANGE_ME"
        priority: 0  # Lowest = preferred
        weight: 1
        zmq:
          enabled: true
          endpoint: "tcp://127.0.0.1:28532"

      - id: backup-1
        host: 192.168.1.100
        port: 14022
        user: rpcuser
        password: "CHANGE_ME"
        priority: 1
        weight: 1
        zmq:
          enabled: false  # ZMQ only on primary

      - id: backup-2
        host: 192.168.1.101
        port: 14022
        user: rpcuser
        password: "CHANGE_ME"
        priority: 2
        weight: 1

    payments:
      enabled: false  # SOLO mining - rewards go directly to coinbase address
      interval: 600s
      minimum_payment: 10.0
      scheme: SOLO

  # Bitcoin Pool (SHA256d)
  - symbol: BTC
    pool_id: btc_mainnet
    enabled: false  # Enable when ready
    address: "bc1qyourbitcoinaddress..."
    coinbase_text: "Spiral Pool"

    stratum:
      port: 4333  # BTC Stratum V1 port
      difficulty:
        initial: 5000           # Suitable for NerdQAxe++ (~5 TH/s), vardiff will adjust
        varDiff:
          enabled: true
          minDiff: 0.001        # Support tiny miners (ESP32)
          maxDiff: 100000000    # Support large ASICs (S19/S21)
          targetTime: 10
          retargetTime: 120
          variancePercent: 30
      banning:
        enabled: true
        banDuration: 600s
        invalidSharesThreshold: 5
      connection:
        timeout: 600s
        maxConnections: 10000
        keepaliveInterval: 60s
      version_rolling:
        enabled: true
        mask: 536862720
      job_rebroadcast: 55s  # BTC blocks are 10 minutes

    nodes:
      # Primary node
      - id: primary
        host: bitcoin-node.local
        port: 8332
        user: rpcuser
        password: "CHANGE_ME"
        priority: 0
        weight: 1
        zmq:
          enabled: true
          endpoint: "tcp://bitcoin-node.local:28332"

      # Backup node for failover
      - id: backup
        host: bitcoin-backup.local
        port: 8332
        user: rpcuser
        password: "CHANGE_ME"
        priority: 1
        weight: 1

    payments:
      enabled: false
      scheme: SOLO

  # Bitcoin Cash Pool (SHA256d)
  - symbol: BCH
    pool_id: bch_mainnet
    enabled: false  # Enable when ready
    address: "bitcoincash:qyourbitcoincashaddress..."  # CashAddr format
    coinbase_text: "Spiral Pool"

    stratum:
