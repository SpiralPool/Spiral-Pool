  # Bitcoin II Pool (SHA256d)
  # ╔═══════════════════════════════════════════════════════════════════════════╗
  # ║  ⚠️  CRITICAL WARNING: BC2/BTC ADDRESS COLLISION RISK                     ║
  # ║                                                                           ║
  # ║  Bitcoin II uses IDENTICAL address formats to Bitcoin:                    ║
  # ║  - Same P2PKH prefix (addresses starting with '1')                        ║
  # ║  - Same P2SH prefix (addresses starting with '3')                         ║
  # ║  - Same Bech32 HRP (addresses starting with 'bc1')                        ║
  # ║                                                                           ║
  # ║  A Bitcoin address will APPEAR valid for BC2, but rewards sent to a       ║
  # ║  BTC address on the BC2 network will be PERMANENTLY LOST!                 ║
  # ║                                                                           ║
  # ║  ALWAYS generate addresses using Bitcoin II Core wallet, NOT Bitcoin Core ║
  # ╚═══════════════════════════════════════════════════════════════════════════╝
  - symbol: BC2
    pool_id: bc2_mainnet
    enabled: false  # Enable when ready
    address: "bc1qyourbitcoiniiadress..."  # MUST be generated by Bitcoin II Core (NOT Bitcoin!)
    coinbase_text: "Spiral Pool"

    stratum:
      port: 6333              # BC2 stratum port
      difficulty:
        initial: 5000         # Suitable for NerdQAxe++ (~5 TH/s), vardiff will adjust
        varDiff:
          enabled: true
          minDiff: 0.001      # Support tiny miners (ESP32)
          maxDiff: 100000000  # High ceiling for ASICs
          targetTime: 10      # 10 seconds between shares
          retargetTime: 120   # Adjust every 2 minutes
          variancePercent: 30
      banning:
        enabled: true
        banDuration: 600s
        invalidSharesThreshold: 5
      connection:
        timeout: 600s
        maxConnections: 10000
        keepaliveInterval: 60s
      version_rolling:
        enabled: true
        mask: 536862720       # 0x1FFFE000
      job_rebroadcast: 55s    # BC2 blocks are 10 minutes

    nodes:
      # Primary BC2 node
      - id: primary
        host: 127.0.0.1
        port: 8339            # BC2 RPC port
        user: spiralbc2
        password: "CHANGE_ME"
        priority: 0
        weight: 1
        zmq:
          enabled: true
          endpoint: "tcp://127.0.0.1:28338"  # BC2 ZMQ port

      # Backup BC2 node (optional)
      - id: backup
        host: bc2-backup.local
        port: 8339
        user: spiralbc2
        password: "CHANGE_ME"
        priority: 1
        weight: 1

    payments:
      enabled: false
      scheme: SOLO

