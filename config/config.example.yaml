# ═══════════════════════════════════════════════════════════════════════════
# MULTI COIN SMART PORT
# Single stratum port that rotates miners between SHA-256d coins on a
# 24-hour weighted schedule. Miners connect once — the pool handles switching.
# Configure via: Dashboard Settings > Multi Coin Smart Port
# See docs: docs/reference/MULTI_COIN_PORT.md
# ═══════════════════════════════════════════════════════════════════════════
#
# multi_port:
#   enabled: true
#   port: 16180                  # Dedicated stratum port (default: 16180)
#   coins:
#     QBX:
#       weight: 96               # 96% of daily mining time (~23 hours)
#       start_hour: 0            # Optional: start at midnight (0-23.99)
#     BC2:
#       weight: 4                # 4% of daily mining time (~1 hour)
#       start_hour: 23           # Optional: start at 11 PM
#   check_interval: 30s          # How often to check schedule boundaries
#   prefer_coin: QBX             # Default coin / tie-breaker
#   min_time_on_coin: 60s        # Minimum time before switch (prevents flip-flopping)
#   timezone: America/New_York   # IANA timezone for 24h schedule
#
#   # Wallet Resolution:
#   # By default, shares are credited to each coin's pool payout address
#   # (the "address" field in each coin's config above). No extra setup needed.
#   #
#   # For public pools where individual miners need per-coin wallets:
#   # wallet_map:
#   #   WorkerName1:
#   #     QBX: "Mqbx1abc..."
#   #     BC2: "1bc2xyz..."
#   #   WorkerName2:
#   #     QBX: "Mqbx1def..."
#   #     BC2: "1bc2uvw..."

# ═══════════════════════════════════════════════════════════════════════════
# EXTERNAL ACCESS CONFIGURATION
# Enables external miners (hashrate marketplaces, etc.) to connect to your pool
# Configure via: spiralctl external setup
# ═══════════════════════════════════════════════════════════════════════════
#
# IMPORTANT: External access is managed separately via spiralctl external
# commands. This section shows the available configuration options but
# actual values are stored in /etc/spiralpool/external.yaml
#
# external:
#   enabled: false
#   mode: "tunnel"  # or "port-forward"
#
#   # Port Forward Mode - requires router configuration
#   portForward:
#     publicHost: "mypool.duckdns.org"
#     publicPort: 3333
#     localPort: 3333
#
#   # Cloudflare Tunnel Mode - no router config needed
#   tunnel:
#     name: "spiralpool-stratum"
#     configPath: "/etc/spiralpool/cloudflared/config.yml"
#     credentialsPath: "/etc/spiralpool/cloudflared/credentials.json"
#     hostname: "stratum.mydomain.com"
#     binaryPath: "/usr/local/bin/cloudflared"
#
#   # Security hardening when external access is enabled
#   security:
#     hardenOnEnable: true          # Auto-apply stricter limits
#     requireTLS: false             # Force TLS for external connections
#     maxConnectionsPerIP: 50       # Override when external enabled
#     sharesPerSecond: 50           # Override when external enabled
#
# To configure external access, use:
#   spiralctl external setup       # Interactive wizard
#   spiralctl external enable      # Enable external access
#   spiralctl external disable     # Disable external access
#   spiralctl external status      # Show current status
#   spiralctl external test        # Test connectivity

# ═══════════════════════════════════════════════════════════════════════════
# SECURITY & RATE LIMITING
# These settings apply to the stratum server for DDoS/abuse protection
# Most are DISABLED by default for hashrate marketplace compatibility
# ═══════════════════════════════════════════════════════════════════════════
#
# Add to any coin's stratum: section to enable security features:
#
#   rateLimiting:
#     enabled: true                    # Master enable for rate limiting
#
#     # IP-based limits (disabled by default for marketplace compatibility)
#     # Set to 0 to disable, or positive number to enable
#     #
#     # IMPORTANT: connectionsPerIP defaults to 0 (unlimited) because
#     # hashrate rental services (mining marketplaces) connect
#     # from dynamic IP addresses that operators cannot predict in advance.
#     # Enabling IP limits would break compatibility with rented hashpower.
#     # This is a deliberate architectural decision, not a security weakness.
#     connectionsPerIP: 0              # Max connections per IP (0 = unlimited)
#     connectionsPerMinute: 0          # Max new connections per IP per minute
#     sharesPerSecond: 0               # Max shares per second per connection
#     workersPerIP: 0                  # Max unique worker names per IP
#
#     # Per-connection limits (enabled by default)
#     preAuthTimeout: 10s              # Must authorize within this time
#     preAuthMessageLimit: 20          # Max messages before authorization
#
#     # Ban settings
#     banThreshold: 10                 # Violations before auto-ban
#     banDuration: 30m                 # Auto-ban duration
#     banPersistencePath: "/spiralpool/data/bans.json"  # Bans persist across restarts
#
#     # Whitelisted IPs (never rate-limited or banned)
#     whitelistIPs:
#       - "127.0.0.1"
#       - "192.168.1.0/24"
#
# For private pools (no rented hashpower), consider enabling these limits:
#   connectionsPerIP: 100
#   sharesPerSecond: 50
#   workersPerIP: 100
#
# For rented hashpower, keep all IP-based limits at 0 (disabled)
