# Spiral Pool - Bitcoin Silver (BTCS) Regtest Integration Test Config
#
# BTCS = SHA-256d, BTC-style consensus, SegWit+Taproot from block 0, 5-minute blocks
# Address formats: B... (P2PKH, 0x1A), bs1q... (bech32), bs1p... (Taproot)
#
# Usage:
#   1. Start bitcoinsilverd in regtest mode (see scripts/linux/regtest.sh btcs)
#   2. Start the pool:  ./spiralpool -config config/regtest/config-btcs-regtest.yaml
#   3. Connect cpuminer: minerd -a sha256d -o stratum+tcp://127.0.0.1:16346 -u TEST.worker1 -p x
#   4. Watch pool logs for block found/submitted messages
#
version: 2

global:
  log_level: debug
  log_format: text
  metrics_port: 19118
  api_port: 14018
  api_enabled: true

  sentinel:
    enabled: true
    check_interval: 30s
    wal_stuck_threshold: 5m
    block_drought_hours: 0
    disconnect_drop_percent: 50
    hashrate_drop_percent: 50
    wal_disk_space_warning_mb: 500
    wal_max_files: 60
    false_rejection_threshold: 0.10
    retry_rate_threshold: 5
    alert_cooldown: 5m
    payment_stall_checks: 5
    goroutine_limit: 10000
    node_health_threshold: 0.5
    ha_flap_window: 10m
    ha_flap_threshold: 3
    orphan_rate_threshold: 0.50
    chain_tip_stall_minutes: 120
    min_peer_count: -1
    maturity_stall_hours: 0

database:
  host: localhost
  port: 5432
  user: spiralstratum
  password: "spiralstratum"
  database: spiralstratum_btcs_regtest
  maxConnections: 50
  batching:
    size: 100
    interval: 2s

coins:
  - symbol: BTCS
    pool_id: btcs_sha256_1
    enabled: true
    address: "REGTEST_ADDRESS_PLACEHOLDER"  # Replace with: bitcoinsilver-cli -regtest getnewaddress "pool-btcs" "bech32"
    coinbase_text: "Spiral Regtest"
    skip_genesis_verify: true

    stratum:
      port: 16346
      port_v2: 17343
      difficulty:
        initial: 0.01
        varDiff:
          enabled: false
          minDiff: 0.001
          maxDiff: 100000000
          targetTime: 10
          retargetTime: 120
          variancePercent: 30
      banning:
        enabled: false
        banDuration: 600s
        invalidSharesThreshold: 100
      connection:
        timeout: 600s
        maxConnections: 100
        keepaliveInterval: 60s
      version_rolling:
        enabled: true
        mask: 536862720
      job_rebroadcast: 30s          # 5-min blocks — rebroadcast more often

    nodes:
      - id: regtest-primary
        host: 127.0.0.1
        port: 18767               # BTCS regtest RPC port
        user: spiraltest
        password: "spiraltest"
        priority: 0
        weight: 1
        zmq:
          enabled: true
          endpoint: "tcp://127.0.0.1:29567"

    payments:
      enabled: true
      scheme: SOLO
      interval: 30s
      blockMaturity: 3
