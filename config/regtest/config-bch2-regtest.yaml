# Spiral Pool - Bitcoin Cash II (BCH2) Regtest Integration Test Config
#
# BCH2 = SHA-256d, BCH consensus rules (SIGHASH_FORKID, ASERT DAA, large blocks)
# CashAddr format: bitcoincashii:q...  (EncodeDestination returns CashAddr for "legacy" type)
#
# Usage:
#   1. Start bitcoincashiid in regtest mode (see scripts/linux/regtest.sh bch2)
#   2. Start the pool:  ./spiralpool -config config/regtest/config-bch2-regtest.yaml
#   3. Connect cpuminer: minerd -a sha256d -o stratum+tcp://127.0.0.1:16336 -u TEST.worker1 -p x
#   4. Watch pool logs for block found/submitted messages
#
version: 2

global:
  log_level: debug
  log_format: text
  metrics_port: 19116
  api_port: 14016
  api_enabled: true

  sentinel:
    enabled: true
    check_interval: 30s
    wal_stuck_threshold: 5m
    block_drought_hours: 0
    disconnect_drop_percent: 50
    hashrate_drop_percent: 50
    wal_disk_space_warning_mb: 500
    wal_max_files: 60
    false_rejection_threshold: 0.10
    retry_rate_threshold: 5
    alert_cooldown: 5m
    payment_stall_checks: 5
    goroutine_limit: 10000
    node_health_threshold: 0.5
    ha_flap_window: 10m
    ha_flap_threshold: 3
    orphan_rate_threshold: 0.50
    chain_tip_stall_minutes: 120
    min_peer_count: -1
    maturity_stall_hours: 0

database:
  host: localhost
  port: 5432
  user: spiralstratum
  password: "spiralstratum"
  database: spiralstratum_bch2_regtest
  maxConnections: 50
  batching:
    size: 100
    interval: 2s

coins:
  - symbol: BCH2
    pool_id: bch2_sha256_1
    enabled: true
    address: "REGTEST_ADDRESS_PLACEHOLDER"  # Replace with: bitcoincashii-cli -regtest getnewaddress "pool-bch2" "legacy"
    coinbase_text: "Spiral Regtest"
    skip_genesis_verify: true

    stratum:
      port: 16336
      port_v2: 17342
      difficulty:
        initial: 0.01
        varDiff:
          enabled: false
          minDiff: 0.001
          maxDiff: 100000000
          targetTime: 10
          retargetTime: 120
          variancePercent: 30
      banning:
        enabled: false
        banDuration: 600s
        invalidSharesThreshold: 100
      connection:
        timeout: 600s
        maxConnections: 100
        keepaliveInterval: 60s
      version_rolling:
        enabled: true
        mask: 536862720
      job_rebroadcast: 55s

    nodes:
      - id: regtest-primary
        host: 127.0.0.1
        port: 18633               # BCH2 regtest RPC port
        user: spiraltest
        password: "spiraltest"
        priority: 0
        weight: 1
        zmq:
          enabled: true
          endpoint: "tcp://127.0.0.1:29433"

    payments:
      enabled: true
      scheme: SOLO
      interval: 30s
      blockMaturity: 3
