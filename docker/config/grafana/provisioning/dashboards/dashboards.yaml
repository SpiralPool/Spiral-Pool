# Spiral Pool — Grafana Dashboard Provisioning
# =============================================
# Auto-loads the Spiral Pool dashboard from the provisioned JSON file.
# The dashboard JSON is mounted at /var/lib/grafana/dashboards/spiralpool/
# via docker-compose volume mounts.

apiVersion: 1

providers:
  - name: SpiralPool
    orgId: 1
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/spiralpool
      foldersFromFilesStructure: false
