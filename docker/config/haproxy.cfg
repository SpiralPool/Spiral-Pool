# ╔════════════════════════════════════════════════════════════════════════════╗
# ║                                                                            ║
# ║           SPIRAL POOL - HAPROXY CONFIGURATION FOR PATRONI                  ║
# ║                                                                            ║
# ║   Routes PostgreSQL connections to the current Patroni leader              ║
# ║                                                                            ║
# ║   ENDPOINTS:                                                               ║
# ║     :5432  - PostgreSQL primary (read-write)                               ║
# ║     :5433  - PostgreSQL replicas (read-only, optional)                     ║
# ║     :7000  - HAProxy statistics dashboard                                  ║
# ║                                                                            ║
# ║   HEALTH CHECKS:                                                           ║
# ║     Patroni exposes /leader and /replica endpoints                         ║
# ║     HAProxy routes based on Patroni's reported role                        ║
# ║                                                                            ║
# ╚════════════════════════════════════════════════════════════════════════════╝

global
    maxconn 1000
    log stdout format raw local0

defaults
    mode tcp
    log global
    option tcplog
    option dontlognull
    option redispatch
    retries 3
    timeout connect 5s
    timeout client 30m
    timeout server 30m
    timeout check 5s

# ═══════════════════════════════════════════════════════════════════════════
# STATISTICS DASHBOARD
# ═══════════════════════════════════════════════════════════════════════════

listen stats
    bind 127.0.0.1:7000
    mode http
    stats enable
    stats uri /
    stats refresh 10s
    # NOTE: stats admin disabled — read-only dashboard prevents unauthenticated
    # server drain/disable. For admin control, use: docker exec spiralpool-haproxy
    # socat /var/run/haproxy.sock stdio

# ═══════════════════════════════════════════════════════════════════════════
# POSTGRESQL PRIMARY (Read-Write)
# ═══════════════════════════════════════════════════════════════════════════
# Routes to current Patroni leader only
# Health check: Patroni /leader returns 200 only for the leader

frontend postgresql_primary
    bind *:5432
    default_backend postgresql_primary_backend

backend postgresql_primary_backend
    option httpchk GET /leader
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions

    server patroni1 patroni1:5432 check port 8008
    server patroni2 patroni2:5432 check port 8008

# ═══════════════════════════════════════════════════════════════════════════
# POSTGRESQL REPLICAS (Read-Only, Optional)
# ═══════════════════════════════════════════════════════════════════════════
# Routes to replicas for read scaling (not used by pool writes)
# Health check: Patroni /replica returns 200 for replicas

frontend postgresql_replicas
    bind *:5433
    default_backend postgresql_replicas_backend

backend postgresql_replicas_backend
    option httpchk GET /replica
    http-check expect status 200
    balance roundrobin
    default-server inter 3s fall 3 rise 2

    server patroni1 patroni1:5432 check port 8008
    server patroni2 patroni2:5432 check port 8008
