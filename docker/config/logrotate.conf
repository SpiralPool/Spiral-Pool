# Spiral Pool Log Rotation Configuration
# =======================================
# This configuration prevents disk exhaustion on long-running pool instances.
#
# Installation (Linux):
#   sudo cp logrotate.conf /etc/logrotate.d/spiralpool
#
# Test configuration:
#   sudo logrotate -d /etc/logrotate.d/spiralpool
#
# Force rotation:
#   sudo logrotate -f /etc/logrotate.d/spiralpool

# Main Spiral Pool logs
/var/log/spiralpool/*.log /spiralpool/logs/*.log {
    # Rotate daily
    daily

    # Keep 30 days of logs (configurable via Logging.MaxAgeDays in config)
    rotate 30

    # Compress old logs to save space
    compress
    delaycompress

    # Don't fail if log file is missing
    missingok

    # Don't rotate empty files
    notifempty

    # Create new log file with correct permissions
    create 0640 spiralpool spiralpool

    # Add date extension to rotated files
    dateext
    dateformat -%Y%m%d

    # Copy and truncate instead of move (safer for running processes)
    copytruncate

    # Max size before forced rotation (100MB default)
    maxsize 100M

    # Minimum size to rotate
    minsize 1M
}

# Stratum server logs (high volume)
/var/log/spiralpool/stratum*.log /spiralpool/logs/stratum*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 spiralpool spiralpool
    dateext
    dateformat -%Y%m%d
    copytruncate
    maxsize 500M
    minsize 10M
}

# Dashboard/API logs
/var/log/spiralpool/api*.log /spiralpool/logs/api*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0640 spiralpool spiralpool
    dateext
    dateformat -%Y%m%d
    copytruncate
    maxsize 50M
}

# Sentinel monitoring logs
/var/log/spiralpool/sentinel*.log /spiralpool/logs/sentinel*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 spiralpool spiralpool
    dateext
    dateformat -%Y%m%d
    copytruncate
    maxsize 50M
}

# DigiByte/Bitcoin node logs (if managed by Spiral Pool)
/var/log/spiralpool/node*.log /spiralpool/logs/node*.log {
    weekly
    rotate 8
    compress
    delaycompress
    missingok
    notifempty
    create 0640 spiralpool spiralpool
    dateext
    dateformat -%Y%m%d
    copytruncate
    maxsize 1G
}
