# ╔════════════════════════════════════════════════════════════════════════════╗
# ║                                                                            ║
# ║           SPIRAL POOL - DOCKER COMPOSE                                    ║
# ║                                                                            ║
# ║   Solo mining in Docker containers                                        ║
# ║                                                                            ║
# ║   MODES:                                                                   ║
# ║   - Single-coin (default): POOL_MODE=single + --profile <coin>            ║
# ║   - Multi-coin:            POOL_MODE=multi  + --profile multi             ║
# ║                                                                            ║
# ║   SUPPORTED COINS:                                                        ║
# ║   - SHA-256d: DigiByte, Bitcoin, Bitcoin Cash, Bitcoin Cash II,          ║
# ║               Bitcoin II, Bitcoin Silver, Namecoin, Syscoin*,            ║
# ║ Myriadcoin, Fractal Bitcoin, eCash ║
# ║               (* Syscoin = merge-mining only, requires BTC parent)       ║
# ║   - Scrypt:   Litecoin, Dogecoin, DigiByte-Scrypt, PepeCoin, Catcoin    ║
# ║                                                                            ║
# ║   MERGE MINING (multi-coin mode only):                                    ║
# ║   - SHA-256d: BTC+NMC, BTC+FBTC, BTC+SYS, BTC+XMY (or DGB as parent)   ║
# ║   - Scrypt:   LTC+DOGE, LTC+PEP                                         ║
# ║                                                                            ║
# ║   STRATUM PROTOCOL:                                                       ║
# ║   V1 Stratum (plain + TLS) and V2 Enhanced (Noise encryption):          ║
# ║   - stratum+tcp://  (V1 plain, standard port)                            ║
# ║   - stratum+ssl://  (V1 TLS encrypted, TLS port)                        ║
# ║   - stratum+sv2://  (V2 Noise encrypted — set STRATUM_V2_ENABLED=true)  ║
# ║                                                                            ║
# ║   NETWORKING: bridge (container isolation with port mapping)              ║
# ║   IPv4 only — IPv6 is not supported.                                    ║
# ║                                                                            ║
# ║   Spiral Pool Contributors                                                ║
# ║                                                                            ║
# ╚════════════════════════════════════════════════════════════════════════════╝
#
# USAGE — SINGLE-COIN (one coin per deployment):
#   docker compose --profile dgb up -d        # DigiByte
#   docker compose --profile btc up -d        # Bitcoin
#   docker compose --profile bch up -d        # Bitcoin Cash
#   docker compose --profile bch2 up -d       # Bitcoin Cash II
#   docker compose --profile bc2 up -d        # Bitcoin II
#   docker compose --profile nmc up -d        # Namecoin
#   docker compose --profile xmy up -d        # Myriadcoin
#   docker compose --profile fbtc up -d       # Fractal Bitcoin
# docker compose --profile up -d # #   docker compose --profile btcs up -d       # Bitcoin Silver
#   docker compose --profile ltc up -d        # Litecoin
#   docker compose --profile doge up -d       # Dogecoin
#   docker compose --profile dgb-scrypt up -d # DigiByte-Scrypt (uses DGB node)
#   docker compose --profile pep up -d        # PepeCoin
#   docker compose --profile cat up -d        # Catcoin
#   docker compose --profile xec up -d        # eCash
#
# USAGE — MULTI-COIN (set POOL_MODE=multi in .env, enable coins with ENABLE_<COIN>=true):
#   docker compose --profile multi up -d      # All enabled coins
#
#   docker compose --profile <profile> logs -f    # View logs
#   docker compose --profile <profile> down       # Stop all services
#   docker compose --profile <profile> ps         # Check status
#
# PORT ALLOCATION (V1 / V2 Noise / TLS):
#   SHA-256d:                        V1      V2      TLS     RPC     P2P
#     DGB:                           3333    3334    3335    14022   12024
#     BTC:                           4333    4334    4335    8332    8333
#     BCH:                           5333    5334    5335    8432    8433
#     BCH2:                          5336    5337    5338    8533    8534
#     BC2:                           6333    6334    6335    8339    8338
#     NMC:                           14335   14336   14337   8336    8334
#     SYS:                           15335   15336   15337   8370    8369
#     XMY:                           17335   17336   17337   10889   10888
#     FBTC:                          18335   18336   18337   8340    8341
#     XEC:                           18338   18339   18340   9004    8343
# : 20335 20336 20337 8344 8345
#     BTCS:                          11335   11336   11337   10567   10566
#   Scrypt:
#     LTC:                           7333    7334    7335    9332    9333
#     DOGE:                          8335    8337    8342    22555   22556
#     DGB-SCRYPT:                    3336    3337    3338    (uses DGB node)
#     PEP:                           10335   10336   10337   33873   33874
#     CAT:                           12335   12336   12337   9932    9933
#   Shared: API 4000, Dashboard 1618, PostgreSQL 5432, Prometheus 9090, Grafana 3000
#   V2 ports are only active when STRATUM_V2_ENABLED=true in .env

# Default logging limits — prevents unbounded log growth filling disk.
# Override per-service if needed. Docker default (json-file, no limit) is unsafe
# for long-running mining pool deployments.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "3"

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # SHA-256d COIN NODES
  # ═══════════════════════════════════════════════════════════════════════════

  # DigiByte (DGB) - SHA-256d
  # NOTE: no-new-privileges NOT set - gosu requires setuid for privilege drop
  digibyte:
    profiles: ["dgb", "dgb-scrypt", "multi"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.digibyte
    container_name: spiralpool-digibyte
    restart: unless-stopped
    logging: *default-logging
    networks:
      - spiralpool
    ports:
      - "12024:12024"   # P2P
      - "127.0.0.1:14022:14022"   # RPC — localhost only
      - "127.0.0.1:28532:28532"   # ZMQ
    environment:
      - RPC_USER=${DGB_RPC_USER:-spiraldgb}
      - RPC_PASSWORD=${DGB_RPC_PASSWORD:?DGB_RPC_PASSWORD must be set}
      - ZMQ_PORT=28532
    volumes:
      - ${DGB_DATA_DIR:-digibyte-data}:/home/digibyte/.digibyte
      - ./config/digibyte.conf.template:/config/digibyte.conf.template:ro
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 12G
        reservations:
          memory: 4G
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      # AUDIT FIX (CR-2): Read credentials from config file instead of CLI args
      # Prevents password exposure via 'docker inspect' and /proc/*/cmdline
      test: ["CMD", "digibyte-cli", "-conf=/home/digibyte/.digibyte/digibyte.conf", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # Bitcoin (BTC) - SHA-256d
  # NOTE: no-new-privileges NOT set - gosu requires setuid for privilege drop
  # NOTE: also included in "sys" profile — Syscoin is merge-mining only and requires BTC as parent.
  bitcoin:
    profiles: ["btc", "sys", "multi"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.bitcoin
    container_name: spiralpool-bitcoin
    restart: unless-stopped
    logging: *default-logging
    networks:
      - spiralpool
    ports:
      - "8333:8333"     # P2P
      - "127.0.0.1:8332:8332"     # RPC — localhost only
      - "127.0.0.1:28332:28332"   # ZMQ
    environment:
      - RPC_USER=${BTC_RPC_USER:-spiralbtc}
      - RPC_PASSWORD=${BTC_RPC_PASSWORD:?BTC_RPC_PASSWORD must be set}
      - ZMQ_PORT=28332
    volumes:
      - ${BTC_DATA_DIR:-bitcoin-data}:/home/bitcoin/.bitcoin
      - ./config/bitcoin.conf.template:/config/bitcoin.conf.template:ro
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 12G
        reservations:
          memory: 4G
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      # AUDIT FIX (CR-2): Read credentials from config file instead of CLI args
      test: ["CMD", "bitcoin-cli", "-conf=/home/bitcoin/.bitcoin/bitcoin.conf", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  # Bitcoin Cash (BCH) - SHA-256d
  # NOTE: no-new-privileges NOT set - gosu requires setuid for privilege drop
  bitcoincash:
    profiles: ["bch", "multi"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.bitcoincash
    container_name: spiralpool-bitcoincash
    restart: unless-stopped
    logging: *default-logging
    networks:
      - spiralpool
    ports:
      - "8433:8433"     # P2P
      - "127.0.0.1:8432:8432"     # RPC — localhost only
      - "127.0.0.1:28432:28432"   # ZMQ
    environment:
      - RPC_USER=${BCH_RPC_USER:-spiralbch}
      - RPC_PASSWORD=${BCH_RPC_PASSWORD:?BCH_RPC_PASSWORD must be set}
      - ZMQ_PORT=28432
    volumes:
      - ${BCH_DATA_DIR:-bitcoincash-data}:/home/bitcoincash/.bitcoin
      - ./config/bitcoincash.conf.template:/config/bitcoincash.conf.template:ro
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 10G
        reservations:
          memory: 2G
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      # AUDIT FIX (CR-2): Read credentials from config file instead of CLI args
      test: ["CMD", "bitcoin-cli", "-conf=/home/bitcoincash/.bitcoin/bitcoin.conf", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  # Bitcoin II (BC2) - SHA-256d
  # NOTE: no-new-privileges NOT set - gosu requires setuid for privilege drop
  bitcoinii:
    profiles: ["bc2", "multi"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.bitcoinii
    container_name: spiralpool-bitcoinii
    restart: unless-stopped
    logging: *default-logging
    networks:
      - spiralpool
    ports:
      - "8338:8338"     # P2P
      - "127.0.0.1:8339:8339"     # RPC — localhost only
      - "127.0.0.1:28338:28338"   # ZMQ — localhost only
    environment:
      - RPC_USER=${BC2_RPC_USER:-spiralbc2}
      - RPC_PASSWORD=${BC2_RPC_PASSWORD:?BC2_RPC_PASSWORD must be set}
      - ZMQ_PORT=28338
    volumes:
      - ${BC2_DATA_DIR:-bitcoinii-data}:/home/bitcoinii/.bitcoinii
      - ./config/bitcoinii.conf.template:/config/bitcoinii.conf.template:ro
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          memory: 1G
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      # AUDIT FIX (CR-2): Read credentials from config file instead of CLI args
      test: ["CMD", "bitcoinii-cli", "-conf=/home/bitcoinii/.bitcoinii/bitcoinii.conf", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Bitcoin Cash II (BCH2) - SHA-256d, BCH consensus rules
  # NOTE: no-new-privileges NOT set - gosu requires setuid for privilege drop
  bitcoincashii:
    profiles: ["bch2", "multi"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.bitcoincashii
    container_name: spiralpool-bitcoincashii
    restart: unless-stopped
    logging: *default-logging
    networks:
      - spiralpool
    ports:
      - "8534:8534"     # P2P
      - "127.0.0.1:8533:8533"     # RPC — localhost only
      - "127.0.0.1:28533:28533"   # ZMQ
    environment:
      - RPC_USER=${BCH2_RPC_USER:-spiralbch2}
      - RPC_PASSWORD=${BCH2_RPC_PASSWORD:?BCH2_RPC_PASSWORD must be set}
      - ZMQ_PORT=28533
    volumes:
      - ${BCH2_DATA_DIR:-bitcoincashii-data}:/home/bitcoincashii/.bitcoincashii
      - ./config/bitcoincashii.conf.template:/config/bitcoincashii.conf.template:ro
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          memory: 1G
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      test: ["CMD", "bitcoincashII-cli", "-conf=/home/bitcoincashii/.bitcoincashii/bitcoincashii.conf", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  # Bitcoin Silver (BTCS) - SHA-256d, BTC-style consensus, 5-min blocks
  # NOTE: no-new-privileges NOT set - gosu requires setuid for privilege drop
  # NOTE: BTCS is built from source — first docker build will take 20-60 minutes
  bitcoinsilver:
    profiles: ["btcs", "multi"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.bitcoinsilver
    container_name: spiralpool-bitcoinsilver
    restart: unless-stopped
    logging: *default-logging
    networks:
      - spiralpool
    ports:
      - "10566:10566"   # P2P
      - "127.0.0.1:10567:10567"   # RPC — localhost only
      - "127.0.0.1:28567:28567"   # ZMQ
    environment:
      - RPC_USER=${BTCS_RPC_USER:-spiralbtcs}
      - RPC_PASSWORD=${BTCS_RPC_PASSWORD:?BTCS_RPC_PASSWORD must be set}
      - ZMQ_PORT=28567
    volumes:
      - ${BTCS_DATA_DIR:-bitcoinsilver-data}:/home/bitcoinsilver/.bitcoinsilver
      - ./config/bitcoinsilver.conf.template:/config/bitcoinsilver.conf.template:ro
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          memory: 1G
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      test: ["CMD", "bitcoinsilver-cli", "-conf=/home/bitcoinsilver/.bitcoinsilver/bitcoinsilver.conf", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  # Namecoin (NMC) - SHA-256d
  # NOTE: no-new-privileges NOT set - gosu requires setuid for privilege drop
  namecoin:
    profiles: ["nmc", "multi"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.namecoin
    container_name: spiralpool-namecoin
    restart: unless-stopped
    logging: *default-logging
    networks:
      - spiralpool
    ports:
      - "8334:8334"     # P2P
      - "127.0.0.1:8336:8336"     # RPC — localhost only
      - "127.0.0.1:28336:28336"   # ZMQ — localhost only
    environment:
      - RPC_USER=${NMC_RPC_USER:-spiralnmc}
      - RPC_PASSWORD=${NMC_RPC_PASSWORD:?NMC_RPC_PASSWORD must be set}
      - ZMQ_PORT=28336
    volumes:
      - ${NMC_DATA_DIR:-namecoin-data}:/home/namecoin/.namecoin
      - ./config/namecoin.conf.template:/config/namecoin.conf.template:ro
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          memory: 1G
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      # AUDIT FIX (CR-2): Read credentials from config file instead of CLI args
      test: ["CMD", "namecoin-cli", "-conf=/home/namecoin/.namecoin/namecoin.conf", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # Myriadcoin (XMY) - SHA-256d
  # NOTE: no-new-privileges NOT set - gosu requires setuid for privilege drop
  myriadcoin:
    profiles: ["xmy", "multi"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.myriadcoin
    container_name: spiralpool-myriadcoin
    restart: unless-stopped
    logging: *default-logging
    networks:
      - spiralpool
    ports:
      - "10888:10888"   # P2P
      - "127.0.0.1:10889:10889"   # RPC — localhost only
      - "127.0.0.1:28889:28889"   # ZMQ — localhost only
    environment:
      - RPC_USER=${XMY_RPC_USER:-spiralxmy}
      - RPC_PASSWORD=${XMY_RPC_PASSWORD:?XMY_RPC_PASSWORD must be set}
      - ZMQ_PORT=28889
    volumes:
      - ${XMY_DATA_DIR:-myriadcoin-data}:/home/myriadcoin/.myriadcoin
      - ./config/myriadcoin.conf.template:/config/myriadcoin.conf.template:ro
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          memory: 1G
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      # AUDIT FIX (CR-2): Read credentials from config file instead of CLI args
      test: ["CMD", "myriadcoin-cli", "-conf=/home/myriadcoin/.myriadcoin/myriadcoin.conf", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # Fractal Bitcoin (FBTC) - SHA-256d
  # NOTE: no-new-privileges NOT set - gosu requires setuid for privilege drop
  # NOTE: Fractal uses Bitcoin Core binaries aliased as fractald/fractal-cli
  fractalbitcoin:
    profiles: ["fbtc", "multi"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.fractalbitcoin
    container_name: spiralpool-fractalbitcoin
    restart: unless-stopped
    logging: *default-logging
    networks:
      - spiralpool
    ports:
      - "8341:8341"     # P2P
      - "127.0.0.1:8340:8340"     # RPC — localhost only
      - "127.0.0.1:28340:28340"   # ZMQ
    environment:
      - RPC_USER=${FBTC_RPC_USER:-spiralfbtc}
      - RPC_PASSWORD=${FBTC_RPC_PASSWORD:?FBTC_RPC_PASSWORD must be set}
      - ZMQ_PORT=28340
    volumes:
      - ${FBTC_DATA_DIR:-fractalbitcoin-data}:/home/fractal/.fractal
      - ./config/fractal.conf.template:/config/fractal.conf.template:ro
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          memory: 1G
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      # AUDIT FIX (CR-2): Read credentials from config file instead of CLI args
      test: ["CMD", "fractal-cli", "-conf=/home/fractal/.fractal/bitcoin.conf", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # eCash (XEC) - SHA-256d, CashAddr, RTT difficulty
  # NOTE: no-new-privileges NOT set - gosu requires setuid for privilege drop
  # NOTE: ecash-node (Bitcoin ABC) uses a non-standard RPC port (9004) and P2P (8343)
  # to avoid conflicts with Bitcoin (8332/8333). RTT difficulty is validated in-pool
  # using the rtt fields from getblocktemplate — no special node flags required.
  ecash:
    profiles: ["xec", "multi"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.ecash
    container_name: spiralpool-ecash
    restart: unless-stopped
    logging: *default-logging
    networks:
      - spiralpool
    ports:
      - "8343:8343"     # P2P (non-default — avoids BTC 8333)
      - "127.0.0.1:9004:9004"     # RPC — localhost only
      - "127.0.0.1:28335:28335"   # ZMQ — localhost only
    environment:
      - RPC_USER=${XEC_RPC_USER:-spiralxec}
      - RPC_PASSWORD=${XEC_RPC_PASSWORD:?XEC_RPC_PASSWORD must be set}
      - ZMQ_PORT=28335
    volumes:
      - ${XEC_DATA_DIR:-ecash-data}:/home/ecash/.bitcoin
      - ./config/ecash.conf.template:/config/ecash.conf.template:ro
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 10G
        reservations:
          memory: 2G
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      # AUDIT FIX (CR-2): Read credentials from config file instead of CLI args
      test: ["CMD", "ecash-cli", "-conf=/home/ecash/.bitcoin/bitcoin.conf", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

 # - SHA-256d (standalone, post-quantum)
  # NOTE: no-new-privileges NOT set - gosu requires setuid for privilege drop
 # NOTE: is a standalone SHA-256d coin with post-quantum (Dilithium) address support

  # Syscoin (SYS) - SHA-256d (merge-mining only, requires BTC parent)
  # NOTE: no-new-privileges NOT set - gosu requires setuid for privilege drop
  # NOTE: SYS cannot be solo mined — it is always merge-mined with BTC.
  # The "sys" profile should only be used in combination with "btc".
  syscoin:
    profiles: ["sys", "multi"]
    depends_on:
      bitcoin:
        condition: service_healthy
        required: false
    build:
      context: ..
      dockerfile: docker/Dockerfile.syscoin
    container_name: spiralpool-syscoin
    restart: unless-stopped
    logging: *default-logging
    networks:
      - spiralpool
    ports:
      - "8369:8369"     # P2P
      - "127.0.0.1:8370:8370"     # RPC — localhost only
      - "127.0.0.1:28370:28370"   # ZMQ — localhost only
    environment:
      - RPC_USER=${SYS_RPC_USER:-spiralsys}
      - RPC_PASSWORD=${SYS_RPC_PASSWORD:?SYS_RPC_PASSWORD must be set}
      - ZMQ_PORT=28370
    volumes:
      - ${SYS_DATA_DIR:-syscoin-data}:/home/syscoin/.syscoin
      - ./config/syscoin.conf.template:/config/syscoin.conf.template:ro
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          memory: 1G
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      # AUDIT FIX (CR-2): Read credentials from config file instead of CLI args
      test: ["CMD", "syscoin-cli", "-conf=/home/syscoin/.syscoin/syscoin.conf", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ═══════════════════════════════════════════════════════════════════════════
  # SCRYPT COIN NODES
  # ═══════════════════════════════════════════════════════════════════════════

  # Litecoin (LTC) - Scrypt
  # NOTE: no-new-privileges NOT set - gosu requires setuid for privilege drop
  litecoin:
    profiles: ["ltc", "multi"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.litecoin
    container_name: spiralpool-litecoin
    restart: unless-stopped
    logging: *default-logging
    networks:
      - spiralpool
    ports:
      - "9333:9333"     # P2P
      - "127.0.0.1:9332:9332"     # RPC — localhost only
      - "127.0.0.1:28933:28933"   # ZMQ — localhost only
    environment:
      - RPC_USER=${LTC_RPC_USER:-spiralltc}
      - RPC_PASSWORD=${LTC_RPC_PASSWORD:?LTC_RPC_PASSWORD must be set}
      - ZMQ_PORT=28933
    volumes:
      - ${LTC_DATA_DIR:-litecoin-data}:/home/litecoin/.litecoin
      - ./config/litecoin.conf.template:/config/litecoin.conf.template:ro
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          memory: 2G
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      # AUDIT FIX (CR-2): Read credentials from config file instead of CLI args
      test: ["CMD", "litecoin-cli", "-conf=/home/litecoin/.litecoin/litecoin.conf", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  # Dogecoin (DOGE) - Scrypt
  # NOTE: no-new-privileges NOT set - gosu requires setuid for privilege drop
  dogecoin:
    profiles: ["doge", "multi"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.dogecoin
    container_name: spiralpool-dogecoin
    restart: unless-stopped
    logging: *default-logging
    networks:
      - spiralpool
    ports:
      - "22556:22556"   # P2P
      - "127.0.0.1:22555:22555"   # RPC — localhost only
      - "127.0.0.1:28555:28555"   # ZMQ — localhost only
    environment:
      - RPC_USER=${DOGE_RPC_USER:-spiraldoge}
      - RPC_PASSWORD=${DOGE_RPC_PASSWORD:?DOGE_RPC_PASSWORD must be set}
      - ZMQ_PORT=28555
    volumes:
      - ${DOGE_DATA_DIR:-dogecoin-data}:/home/dogecoin/.dogecoin
      - ./config/dogecoin.conf.template:/config/dogecoin.conf.template:ro
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          memory: 2G
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      # AUDIT FIX (CR-2): Read credentials from config file instead of CLI args
      test: ["CMD", "dogecoin-cli", "-conf=/home/dogecoin/.dogecoin/dogecoin.conf", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  # PepeCoin (PEP) - Scrypt
  # NOTE: no-new-privileges NOT set - gosu requires setuid for privilege drop
  pepecoin:
    profiles: ["pep", "multi"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.pepecoin
    container_name: spiralpool-pepecoin
    restart: unless-stopped
    logging: *default-logging
    networks:
      - spiralpool
    ports:
      - "33874:33874"   # P2P
      - "127.0.0.1:33873:33873"   # RPC — localhost only
      - "127.0.0.1:28873:28873"   # ZMQ — localhost only
    environment:
      - RPC_USER=${PEP_RPC_USER:-spiralpep}
      - RPC_PASSWORD=${PEP_RPC_PASSWORD:?PEP_RPC_PASSWORD must be set}
      - ZMQ_PORT=28873
    volumes:
      - ${PEP_DATA_DIR:-pepecoin-data}:/home/pepecoin/.pepecoin
      - ./config/pepecoin.conf.template:/config/pepecoin.conf.template:ro
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          memory: 1G
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      # AUDIT FIX (CR-2): Read credentials from config file instead of CLI args
      test: ["CMD", "pepecoin-cli", "-conf=/home/pepecoin/.pepecoin/pepecoin.conf", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # Catcoin (CAT) - Scrypt
  # NOTE: no-new-privileges NOT set - gosu requires setuid for privilege drop
  catcoin:
    profiles: ["cat", "multi"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.catcoin
    container_name: spiralpool-catcoin
    restart: unless-stopped
    logging: *default-logging
    networks:
      - spiralpool
    ports:
      - "9933:9933"     # P2P
      - "127.0.0.1:9932:9932"     # RPC — localhost only
      - "127.0.0.1:28932:28932"   # ZMQ — localhost only
    environment:
      - RPC_USER=${CAT_RPC_USER:-spiralcat}
      - RPC_PASSWORD=${CAT_RPC_PASSWORD:?CAT_RPC_PASSWORD must be set}
      - ZMQ_PORT=28932
    volumes:
      - ${CAT_DATA_DIR:-catcoin-data}:/home/catcoin/.catcoin
      - ./config/catcoin.conf.template:/config/catcoin.conf.template:ro
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          memory: 1G
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      # AUDIT FIX (CR-2): Read credentials from config file instead of CLI args
      test: ["CMD", "catcoin-cli", "-conf=/home/catcoin/.catcoin/catcoin.conf", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ═══════════════════════════════════════════════════════════════════════════
  # POSTGRESQL DATABASE (Shared across all coins)
  # ═══════════════════════════════════════════════════════════════════════════
  # NOTE: no-new-privileges NOT set - official postgres image uses gosu
  postgres:
 profiles: ["dgb", "btc", "bch", "bc2", "bch2", "btcs", "nmc", "sys", "xmy", "fbtc", "xec", "ltc", "doge", "dgb-scrypt", "pep", "cat", "multi"]
    image: postgres:18.1-alpine
    container_name: spiralpool-postgres
    restart: unless-stopped
    logging: *default-logging
    networks:
      - spiralpool
    ports:
      - "127.0.0.1:5433:5432"  # Localhost only — stratum uses Docker network
    environment:
      - POSTGRES_USER=${DB_USER:-spiralstratum}
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - POSTGRES_DB=${DB_NAME:-spiralstratum}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          memory: 1G
    shm_size: 256mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-spiralstratum} -d ${DB_NAME:-spiralstratum}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s   # WAL recovery after crash can take 30-120s

  # ═══════════════════════════════════════════════════════════════════════════
  # SPIRAL STRATUM (POOL SERVER)
  # ═══════════════════════════════════════════════════════════════════════════
  stratum:
 profiles: ["dgb", "btc", "bch", "bc2", "bch2", "btcs", "nmc", "sys", "xmy", "fbtc", "xec", "ltc", "doge", "dgb-scrypt", "pep", "cat", "multi"]
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: spiralpool-stratum
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - spiralpool
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # Stratum ports (V1 plain + V2 Noise + TLS)
      # NOTE: Port assignments are fixed per coin. Miners MUST specify the correct
      # port for their chosen coin. V2 uses Noise Protocol encryption (no certs needed).
      # V2 ports are only active when STRATUM_V2_ENABLED=true in .env.
      # SHA-256d Stratum ports (V1 / V2 / TLS)
      - "3333:3333"     # DGB Stratum V1
      - "3334:3334"     # DGB Stratum V2 (Noise)
      - "3335:3335"     # DGB Stratum TLS
      - "4333:4333"     # BTC Stratum V1
      - "4334:4334"     # BTC Stratum V2 (Noise)
      - "4335:4335"     # BTC Stratum TLS
      - "5333:5333"     # BCH Stratum V1
      - "5334:5334"     # BCH Stratum V2 (Noise)
      - "5335:5335"     # BCH Stratum TLS
      - "16180:16180"   # Smart Multi Stratum V1
      - "6333:6333"     # BC2 Stratum V1
      - "6334:6334"     # BC2 Stratum V2 (Noise)
      - "6335:6335"     # BC2 Stratum TLS
      - "5336:5336"     # BCH2 Stratum V1
      - "5337:5337"     # BCH2 Stratum V2 (Noise)
      - "5338:5338"     # BCH2 Stratum TLS
      - "11335:11335"   # BTCS Stratum V1
      - "11336:11336"   # BTCS Stratum V2 (Noise)
      - "11337:11337"   # BTCS Stratum TLS
      # Scrypt Stratum ports (V1 / V2 / TLS)
      - "7333:7333"     # LTC Stratum V1
      - "7334:7334"     # LTC Stratum V2 (Noise)
      - "7335:7335"     # LTC Stratum TLS
      - "8335:8335"     # DOGE Stratum V1
      - "8337:8337"     # DOGE Stratum V2 (Noise)
      - "8342:8342"     # DOGE Stratum TLS
      - "3336:3336"     # DGB-SCRYPT Stratum V1
      - "3337:3337"     # DGB-SCRYPT Stratum V2 (Noise)
      - "3338:3338"     # DGB-SCRYPT Stratum TLS
      - "10335:10335"   # PEP Stratum V1
      - "10336:10336"   # PEP Stratum V2 (Noise)
      - "10337:10337"   # PEP Stratum TLS
      - "12335:12335"   # CAT Stratum V1
      - "12336:12336"   # CAT Stratum V2 (Noise)
      - "12337:12337"   # CAT Stratum TLS
      # Merge-minable Stratum ports (V1 / V2 / TLS)
      - "14335:14335"   # NMC Stratum V1
      - "14336:14336"   # NMC Stratum V2 (Noise)
      - "14337:14337"   # NMC Stratum TLS
      - "17335:17335"   # XMY Stratum V1
      - "17336:17336"   # XMY Stratum V2 (Noise)
      - "17337:17337"   # XMY Stratum TLS
      - "15335:15335"   # SYS Stratum V1
      - "15336:15336"   # SYS Stratum V2 (Noise)
      - "15337:15337"   # SYS Stratum TLS
      - "18335:18335"   # FBTC Stratum V1
      - "18336:18336"   # FBTC Stratum V2 (Noise)
      - "18337:18337"   # FBTC Stratum TLS
      - "18338:18338"   # XEC Stratum V1
      - "18339:18339"   # XEC Stratum V2 (Noise)
      - "18340:18340"   # XEC Stratum TLS
 - "20335:20335" # Stratum V1
 - "20336:20336" # Stratum V2 (Noise)
 - "20337:20337" # Stratum TLS
      # API
      - "4000:4000"     # Pool API
      - "9100:9100"     # Prometheus metrics
    depends_on:
      postgres:
        condition: service_healthy
      # required: false means "wait for this service if it was started by the active
      # profile; skip silently if it is not part of this deployment."
      digibyte:
        condition: service_healthy
        required: false
      bitcoin:
        condition: service_healthy
        required: false
      bitcoincash:
        condition: service_healthy
        required: false
      bitcoincashii:
        condition: service_healthy
        required: false
      bitcoinii:
        condition: service_healthy
        required: false
      bitcoinsilver:
        condition: service_healthy
        required: false
      namecoin:
        condition: service_healthy
        required: false
      myriadcoin:
        condition: service_healthy
        required: false
      fractalbitcoin:
        condition: service_healthy
        required: false
      ecash:
        condition: service_healthy
        required: false
 :
        condition: service_healthy
        required: false
      syscoin:
        condition: service_healthy
        required: false
      litecoin:
        condition: service_healthy
        required: false
      dogecoin:
        condition: service_healthy
        required: false
      pepecoin:
        condition: service_healthy
        required: false
      catcoin:
        condition: service_healthy
        required: false
    environment:
      # RPC credentials (SHA-256d coins) — coin-specific vars used by entrypoint auto-detection
      - DGB_RPC_USER=${DGB_RPC_USER:-spiraldgb}
      - DGB_RPC_PASSWORD=${DGB_RPC_PASSWORD:-}
      - BTC_RPC_USER=${BTC_RPC_USER:-spiralbtc}
      - BTC_RPC_PASSWORD=${BTC_RPC_PASSWORD:-}
      - BCH_RPC_USER=${BCH_RPC_USER:-spiralbch}
      - BCH_RPC_PASSWORD=${BCH_RPC_PASSWORD:-}
      - BCH2_RPC_USER=${BCH2_RPC_USER:-spiralbch2}
      - BCH2_RPC_PASSWORD=${BCH2_RPC_PASSWORD:-}
      - BC2_RPC_USER=${BC2_RPC_USER:-spiralbc2}
      - BC2_RPC_PASSWORD=${BC2_RPC_PASSWORD:-}
      - BTCS_RPC_USER=${BTCS_RPC_USER:-spiralbtcs}
      - BTCS_RPC_PASSWORD=${BTCS_RPC_PASSWORD:-}
      - NMC_RPC_USER=${NMC_RPC_USER:-spiralnmc}
      - NMC_RPC_PASSWORD=${NMC_RPC_PASSWORD:-}
      - XMY_RPC_USER=${XMY_RPC_USER:-spiralxmy}
      - XMY_RPC_PASSWORD=${XMY_RPC_PASSWORD:-}
      - SYS_RPC_USER=${SYS_RPC_USER:-spiralsys}
      - SYS_RPC_PASSWORD=${SYS_RPC_PASSWORD:-}
      - FBTC_RPC_USER=${FBTC_RPC_USER:-spiralfbtc}
      - FBTC_RPC_PASSWORD=${FBTC_RPC_PASSWORD:-}
      - XEC_RPC_USER=${XEC_RPC_USER:-spiralxec}
      - XEC_RPC_PASSWORD=${XEC_RPC_PASSWORD:-}
      # RPC credentials (Scrypt coins)
      - LTC_RPC_USER=${LTC_RPC_USER:-spiralltc}
      - LTC_RPC_PASSWORD=${LTC_RPC_PASSWORD:-}
      - DOGE_RPC_USER=${DOGE_RPC_USER:-spiraldoge}
      - DOGE_RPC_PASSWORD=${DOGE_RPC_PASSWORD:-}
      - PEP_RPC_USER=${PEP_RPC_USER:-spiralpep}
      - PEP_RPC_PASSWORD=${PEP_RPC_PASSWORD:-}
      - CAT_RPC_USER=${CAT_RPC_USER:-spiralcat}
      - CAT_RPC_PASSWORD=${CAT_RPC_PASSWORD:-}
      # Database
      - DB_USER=${DB_USER:-spiralstratum}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-spiralstratum}
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT:-5432}
      # Branding
      - COINBASE_TEXT=${COINBASE_TEXT:-Mined by Spiral Pool}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - SPIRAL_METRICS_TOKEN=${SPIRAL_METRICS_TOKEN:-}
      # Pool mode and config (used by stratum-entrypoint.sh)
      - POOL_MODE=${POOL_MODE:-single}
      - POOL_COIN=${POOL_COIN:-}
      - POOL_ID=${POOL_ID:-}
      - POOL_ADDRESS=${POOL_ADDRESS:-}
      # Multi-coin mode: per-coin enable flags and wallet addresses
      - ENABLE_DGB=${ENABLE_DGB:-false}
      - DGB_POOL_ADDRESS=${DGB_POOL_ADDRESS:-}
      - ENABLE_BTC=${ENABLE_BTC:-false}
      - BTC_POOL_ADDRESS=${BTC_POOL_ADDRESS:-}
      - ENABLE_BCH=${ENABLE_BCH:-false}
      - BCH_POOL_ADDRESS=${BCH_POOL_ADDRESS:-}
      - ENABLE_BCH2=${ENABLE_BCH2:-false}
      - BCH2_POOL_ADDRESS=${BCH2_POOL_ADDRESS:-}
      - ENABLE_BC2=${ENABLE_BC2:-false}
      - BC2_POOL_ADDRESS=${BC2_POOL_ADDRESS:-}
      - ENABLE_BTCS=${ENABLE_BTCS:-false}
      - BTCS_POOL_ADDRESS=${BTCS_POOL_ADDRESS:-}
      - ENABLE_NMC=${ENABLE_NMC:-false}
      - NMC_POOL_ADDRESS=${NMC_POOL_ADDRESS:-}
      - ENABLE_SYS=${ENABLE_SYS:-false}
      - SYS_POOL_ADDRESS=${SYS_POOL_ADDRESS:-}
      - ENABLE_XMY=${ENABLE_XMY:-false}
      - XMY_POOL_ADDRESS=${XMY_POOL_ADDRESS:-}
      - ENABLE_FBTC=${ENABLE_FBTC:-false}
      - FBTC_POOL_ADDRESS=${FBTC_POOL_ADDRESS:-}
      - ENABLE_XEC=${ENABLE_XEC:-false}
      - XEC_POOL_ADDRESS=${XEC_POOL_ADDRESS:-}
      - ENABLE_LTC=${ENABLE_LTC:-false}
      - LTC_POOL_ADDRESS=${LTC_POOL_ADDRESS:-}
      - ENABLE_DOGE=${ENABLE_DOGE:-false}
      - DOGE_POOL_ADDRESS=${DOGE_POOL_ADDRESS:-}
      - ENABLE_DGB_SCRYPT=${ENABLE_DGB_SCRYPT:-false}
      - ENABLE_PEP=${ENABLE_PEP:-false}
      - PEP_POOL_ADDRESS=${PEP_POOL_ADDRESS:-}
      - ENABLE_CAT=${ENABLE_CAT:-false}
      - CAT_POOL_ADDRESS=${CAT_POOL_ADDRESS:-}
      # Merge mining (multi-coin mode only)
      - MERGE_MINING_ENABLED=${MERGE_MINING_ENABLED:-false}
      - MERGE_MINING_ALGO=${MERGE_MINING_ALGO:-sha256d}
      - MERGE_MINING_AUX_CHAINS_SHA256D=${MERGE_MINING_AUX_CHAINS_SHA256D:-}
      - MERGE_MINING_AUX_CHAINS_SCRYPT=${MERGE_MINING_AUX_CHAINS_SCRYPT:-}
      # Stratum difficulty / varDiff tuning
      - STRATUM_DIFF_INITIAL=${STRATUM_DIFF_INITIAL:-}
      - STRATUM_DIFF_MIN=${STRATUM_DIFF_MIN:-}
      - STRATUM_DIFF_MAX=${STRATUM_DIFF_MAX:-}
      - STRATUM_VARDIFF_TARGET_TIME=${STRATUM_VARDIFF_TARGET_TIME:-}
      - STRATUM_USE_CONFIG_DIFFICULTY=${STRATUM_USE_CONFIG_DIFFICULTY:-true}
      - STRATUM_VERSION_ROLLING=${STRATUM_VERSION_ROLLING:-}
      - STRATUM_VERSION_ROLLING_MASK=${STRATUM_VERSION_ROLLING_MASK:-}
      # Stratum V2 (Noise Protocol — opt-in, keys generated in memory)
      - STRATUM_V2_ENABLED=${STRATUM_V2_ENABLED:-false}
      # Daemon connection — auto-detected by entrypoint from POOL_COIN + coin RPC vars.
      # Set these only to override auto-detection (e.g., remote daemon).
      - DAEMON_HOST=${DAEMON_HOST:-}
      - DAEMON_RPC_PORT=${DAEMON_RPC_PORT:-}
      - DAEMON_RPC_USER=${DAEMON_RPC_USER:-}
      - DAEMON_RPC_PASSWORD=${DAEMON_RPC_PASSWORD:-}
      - DAEMON_ZMQ_PORT=${DAEMON_ZMQ_PORT:-}
      - STRATUM_PORT=${STRATUM_PORT:-}
      - STRATUM_PORT_TLS=${STRATUM_PORT_TLS:-}
      - TLS_CERT_FILE=${TLS_CERT_FILE:-/spiralpool/tls/stratum.crt}
      - TLS_KEY_FILE=${TLS_KEY_FILE:-/spiralpool/tls/stratum.key}
    volumes:
      - stratum-logs:/spiralpool/logs
      - shared-data:/spiralpool/data
      - ./config/config.docker.template:/spiralpool/config/config.docker.template:ro
      - ./tls:/spiralpool/tls:ro
      - ./config:/spiralpool/config
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          memory: 2G
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/pools"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ═══════════════════════════════════════════════════════════════════════════
  # SPIRAL DASHBOARD
  # ═══════════════════════════════════════════════════════════════════════════
  dashboard:
 profiles: ["dgb", "btc", "bch", "bc2", "bch2", "btcs", "nmc", "sys", "xmy", "fbtc", "xec", "ltc", "doge", "dgb-scrypt", "pep", "cat", "multi"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: spiralpool-dashboard
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - spiralpool
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "1618:1618"     # Dashboard UI
    depends_on:
      stratum:
        condition: service_healthy
    environment:
      - POOL_API_URL=http://stratum:4000
      - PROMETHEUS_URL=http://stratum:9100
      - POOL_ID=${POOL_ID:-}
      # Dashboard Authentication (v2.0.0)
      - DASHBOARD_AUTH_ENABLED=${DASHBOARD_AUTH_ENABLED:-true}
      - DASHBOARD_SESSION_LIFETIME=${DASHBOARD_SESSION_LIFETIME:-24}
      - DASHBOARD_API_KEY=${DASHBOARD_API_KEY:-}
      - DASHBOARD_CORS_ORIGINS=${DASHBOARD_CORS_ORIGINS:-}
      - SPIRAL_ADMIN_API_KEY=${ADMIN_API_KEY:-}
      # PostgreSQL connection for block history feature
      # DB_PASSWORD must be set in your .env file — it is NOT optional
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${DB_NAME:-spiralstratum}
      - POSTGRES_USER=${DB_USER:-spiralstratum}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - dashboard-config:/spiralpool/dashboard/data
      - dashboard-auth:/app/data
      - shared-data:/spiralpool/data
      # Mount dashboard_config.json if present — file must be created by the operator
      # with their own wallet address (see docker/config/dashboard_config.json.example)
      - ./config/dashboard_config.json:/spiralpool/dashboard/data/dashboard_config.json
      - ./config/dashboard_config.json:/app/data/dashboard_config.json
      - ./config:/spiralpool/config
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1618/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════════════════
  # SPIRAL SENTINEL (MONITORING & ALERTS)
  # ═══════════════════════════════════════════════════════════════════════════
  sentinel:
 profiles: ["dgb", "btc", "bch", "bc2", "bch2", "btcs", "nmc", "sys", "xmy", "fbtc", "xec", "ltc", "doge", "dgb-scrypt", "pep", "cat", "multi"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.sentinel
    container_name: spiralpool-sentinel
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - spiralpool
    depends_on:
      stratum:
        condition: service_healthy
    environment:
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - XMPP_JID=${XMPP_JID:-}
      - XMPP_PASSWORD=${XMPP_PASSWORD:-}
      - XMPP_RECIPIENT=${XMPP_RECIPIENT:-}
      - NTFY_URL=${NTFY_URL:-}
      - NTFY_TOKEN=${NTFY_TOKEN:-}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - WEBHOOK_HEADERS=${WEBHOOK_HEADERS:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_TO=${SMTP_TO:-}
      - POOL_API_URL=http://stratum:4000
      - SPIRAL_ADMIN_API_KEY=${ADMIN_API_KEY:-}
      # Wallet addresses for monitoring (all coins)
      - DGB_WALLET_ADDRESS=${DGB_POOL_ADDRESS:-}
      - BTC_WALLET_ADDRESS=${BTC_POOL_ADDRESS:-}
      - BCH_WALLET_ADDRESS=${BCH_POOL_ADDRESS:-}
      - BCH2_WALLET_ADDRESS=${BCH2_POOL_ADDRESS:-}
      - BC2_WALLET_ADDRESS=${BC2_POOL_ADDRESS:-}
      - BTCS_WALLET_ADDRESS=${BTCS_POOL_ADDRESS:-}
      - LTC_WALLET_ADDRESS=${LTC_POOL_ADDRESS:-}
      - DOGE_WALLET_ADDRESS=${DOGE_POOL_ADDRESS:-}
      - NMC_WALLET_ADDRESS=${NMC_POOL_ADDRESS:-}
      - SYS_WALLET_ADDRESS=${SYS_POOL_ADDRESS:-}
      - XMY_WALLET_ADDRESS=${XMY_POOL_ADDRESS:-}
      - FBTC_WALLET_ADDRESS=${FBTC_POOL_ADDRESS:-}
      - XEC_WALLET_ADDRESS=${XEC_POOL_ADDRESS:-}
      - PEP_WALLET_ADDRESS=${PEP_POOL_ADDRESS:-}
      - CAT_WALLET_ADDRESS=${CAT_POOL_ADDRESS:-}
      - DGB_SCRYPT_WALLET_ADDRESS=${DGB_SCRYPT_ADDRESS:-${DGB_POOL_ADDRESS:-}}
      - EXPECTED_FLEET_THS=${EXPECTED_FLEET_THS:-22}
      - ALERT_THEME=${ALERT_THEME:-cyberpunk}
    volumes:
      - sentinel-config:/home/spiraluser/.spiralsentinel
      - shared-data:/spiralpool/data
      # Mount sentinel_config.json if present — must be created by operator
      - ./config/sentinel_config.json:/home/spiraluser/.spiralsentinel/config.json
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      # Check sentinel's own process is alive (not stratum's endpoint — sentinel
      # must stay "healthy" even when stratum is down, since that's exactly when
      # sentinel needs to fire alerts)
      test: ["CMD", "python3", "-c", "import os, signal; os.kill(1, 0)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════════════════
  # PROMETHEUS (METRICS COLLECTION)
  # ═══════════════════════════════════════════════════════════════════════════
  prometheus:
 profiles: ["dgb", "btc", "bch", "bc2", "bch2", "btcs", "nmc", "sys", "xmy", "fbtc", "xec", "ltc", "doge", "dgb-scrypt", "pep", "cat", "multi"]
    image: prom/prometheus:v2.51.0
    container_name: spiralpool-prometheus
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - spiralpool
    ports:
      - "127.0.0.1:9090:9090"  # Localhost only — no unauthenticated admin API exposure
    depends_on:
      stratum:
        condition: service_healthy
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
      - shared-data:/spiralpool/data:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════════════════
  # GRAFANA (DASHBOARDS & ALERTING)
  # ═══════════════════════════════════════════════════════════════════════════
  grafana:
 profiles: ["dgb", "btc", "bch", "bc2", "bch2", "btcs", "nmc", "sys", "xmy", "fbtc", "xec", "ltc", "doge", "dgb-scrypt", "pep", "cat", "multi"]
    image: grafana/grafana-oss:10.4.2
    container_name: spiralpool-grafana
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - spiralpool
    ports:
      - "127.0.0.1:3000:3000"  # Localhost only — front with reverse proxy for external access
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set - run generate-secrets.sh}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_ALERTING_ENABLED=false
      # Notification credentials (used by provisioned contact points)
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning/datasources/:/etc/grafana/provisioning/datasources/:ro
      - ./config/grafana/provisioning/alerting/:/etc/grafana/provisioning/alerting/:ro
      - ./config/grafana/provisioning/dashboards/:/etc/grafana/provisioning/dashboards/:ro
      - ./config/grafana/dashboards/:/var/lib/grafana/dashboards/spiralpool/:ro
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

# ═══════════════════════════════════════════════════════════════════════════════
# NETWORKS
# ═══════════════════════════════════════════════════════════════════════════════

networks:
  spiralpool:
    name: spiralpool-network
    driver: bridge

# ═══════════════════════════════════════════════════════════════════════════════
# VOLUMES
# ═══════════════════════════════════════════════════════════════════════════════

volumes:
  # SHA-256d coin data volumes
  digibyte-data:
    name: spiralpool-digibyte-data
  bitcoin-data:
    name: spiralpool-bitcoin-data
  bitcoincash-data:
    name: spiralpool-bitcoincash-data
  bitcoinii-data:
    name: spiralpool-bitcoinii-data
  bitcoincashii-data:
    name: spiralpool-bitcoincashii-data
  bitcoinsilver-data:
    name: spiralpool-bitcoinsilver-data
  namecoin-data:
    name: spiralpool-namecoin-data
  myriadcoin-data:
    name: spiralpool-myriadcoin-data
  fractalbitcoin-data:
    name: spiralpool-fractalbitcoin-data
  ecash-data:
    name: spiralpool-ecash-data
  syscoin-data:
    name: spiralpool-syscoin-data
  # Scrypt coin data volumes
  litecoin-data:
    name: spiralpool-litecoin-data
  dogecoin-data:
    name: spiralpool-dogecoin-data
  pepecoin-data:
    name: spiralpool-pepecoin-data
  catcoin-data:
    name: spiralpool-catcoin-data
  # Shared service volumes
  postgres-data:
    name: spiralpool-postgres-data
  stratum-logs:
    name: spiralpool-stratum-logs
  dashboard-config:
    name: spiralpool-dashboard-config
  dashboard-auth:
    name: spiralpool-dashboard-auth
  sentinel-config:
    name: spiralpool-sentinel-config
  shared-data:
    name: spiralpool-shared-data
  # Monitoring volumes
  prometheus-data:
    name: spiralpool-prometheus-data
  grafana-data:
    name: spiralpool-grafana-data
