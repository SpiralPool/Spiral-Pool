name: Security Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Sundays at midnight UTC
    - cron: '0 0 * * 0'

jobs:
  build:
    name: Build Verification
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./src/stratum

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: src/stratum/go.sum

      - name: Verify dependencies
        run: |
          go mod verify
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build stratum binary
        run: |
          go build -v ./...

      - name: Run unit tests with coverage
        run: |
          go test -v -timeout 5m -coverprofile=coverage.out ./...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          # Fail if coverage drops below 50%
          if [ "$(echo "$COVERAGE < 50" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below minimum threshold of 50%"
            exit 1
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: src/stratum/coverage.out
          retention-days: 30
        if: always()

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: build

    defaults:
      run:
        working-directory: ./src/stratum

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: src/stratum/go.sum

      - name: Install security tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run govulncheck
        run: |
          govulncheck ./...

      - name: Run gosec
        run: |
          gosec -fmt=sarif -out=gosec-results.sarif ./...
          gosec -fmt=text ./...

      - name: Run staticcheck
        run: |
          staticcheck ./...

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: src/stratum/gosec-results.sarif
        if: always()

  race-detection:
    name: Race Detection Tests
    runs-on: ubuntu-latest
    needs: build

    defaults:
      run:
        working-directory: ./src/stratum

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: src/stratum/go.sum

      - name: Run tests with race detector
        run: |
          go test -race -v -timeout 10m ./...

  fuzz-testing:
    name: Fuzz Testing
    runs-on: ubuntu-latest
    needs: build

    defaults:
      run:
        working-directory: ./src/stratum

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: src/stratum/go.sum

      - name: Run fuzz tests
        run: |
          # Run each fuzz test for 30 seconds
          go test -fuzz=FuzzWorkerIdentity -fuzztime=30s ./internal/shares/...
          go test -fuzz=FuzzDifficultyValue -fuzztime=30s ./internal/shares/...
          go test -fuzz=FuzzNonce -fuzztime=30s ./internal/shares/...
          go test -fuzz=FuzzJSONMessageParsing -fuzztime=30s ./internal/stratum/v1/...
          go test -fuzz=FuzzWorkerName -fuzztime=30s ./internal/stratum/v1/...

  dco-check:
    name: DCO Sign-off Verification
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify DCO sign-off on all commits
        run: |
          FAILED=0
          for COMMIT in $(git log --format='%H' origin/${{ github.base_ref }}..HEAD); do
            if ! git log -1 --format='%B' "$COMMIT" | grep -q '^Signed-off-by: .* <.*>'; then
              echo "::error::Commit $COMMIT is missing DCO sign-off (Signed-off-by: Name <email>)"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "All commits must include a DCO sign-off line."
            echo "Use: git commit -s -m \"your message\""
            echo "See DCO and CONTRIBUTING.md for details."
            exit 1
          fi
          echo "All commits have valid DCO sign-off."

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
          deny-licenses: GPL-3.0, AGPL-3.0
