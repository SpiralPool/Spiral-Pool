name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./src/stratum

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: src/stratum/go.sum

      - name: Validate tag matches VERSION file
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          FILE_VERSION="$(cat ../../VERSION | tr -d '[:space:]')"
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match VERSION file ($FILE_VERSION)"
            exit 1
          fi
          echo "Version: $TAG_VERSION"

      - name: Run tests
        run: go test ./... -count=1 -timeout 300s

      - name: Build binary
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o spiralpool-${VERSION}-linux-amd64 \
            ./cmd/spiralpool

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -50)
          fi
          # Write to file to handle multiline
          echo "$CHANGELOG" > /tmp/changelog.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Spiral Pool ${{ github.ref_name }}"
          body_path: /tmp/changelog.txt
          draft: false
          prerelease: false
          files: |
            src/stratum/spiralpool-*-linux-amd64
          generate_release_notes: true
